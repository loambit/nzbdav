name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit production dependencies
        working-directory: frontend
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      # Same production build Docker uses; catches .server import / bundler errors typecheck misses.
      - name: Build
        working-directory: frontend
        run: npm run build && npm run build:server

      # Node ESM requires explicit .js extensions in emitted dist-node imports.
      - name: Smoke-import dist-node server modules
        working-directory: frontend
        run: node --input-type=module -e "import('./dist-node/server/security-headers.js')"

      # The production launcher (server.ts) requires these exports; a build that
      # falls back to the virtual SSR entry ships a server that crashes on start.
      - name: Assert SSR build exports the custom server
        working-directory: frontend
        env:
          BACKEND_URL: http://localhost:9
        run: node --input-type=module -e "const m = await import('./build/server/index.js'); if (typeof m.app !== 'function' || typeof m.initializeWebsocketServer !== 'function') { console.error('build/server/index.js is missing custom server exports (app, initializeWebsocketServer)'); process.exit(1); }"

      - name: Test frontend with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore

  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Verify formatting
        run: dotnet format whitespace --verify-no-changes --folder backend && dotnet format whitespace --verify-no-changes --folder tests

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore backend
        run: dotnet restore backend/NzbWebDAV.csproj && dotnet restore tests/NzbWebDAV.Tests/NzbWebDAV.Tests.csproj

      - name: List vulnerable packages
        continue-on-error: true
        run: dotnet list backend/NzbWebDAV.csproj package --vulnerable --include-transitive

      - name: Build backend
        working-directory: backend
        run: dotnet publish -c Release -o ./publish --no-restore

      - name: Test backend
        run: dotnet test tests/NzbWebDAV.Tests/NzbWebDAV.Tests.csproj -c Release --no-restore --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload backend coverage
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore
