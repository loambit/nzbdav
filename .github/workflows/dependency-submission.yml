name: Dependency submission

# Self-managed replacement for GitHub's "Automatic dependency submission"
# (dynamic/dependency-graph/auto-submission), which cannot authenticate against
# the private UsenetSharp GitHub Packages feed.
#
# After merging, disable automatic submission at:
# Settings → Code security and analysis → Automatic dependency submission

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  id-token: write

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Authenticate GitHub Packages
        working-directory: backend
        run: |
          dotnet nuget update source github \
            --username nzbdav \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      - name: Restore .NET dependencies
        working-directory: backend
        run: dotnet restore

      - name: Submit dependency graph
        uses: advanced-security/component-detection-dependency-submission-action@v0.1.1
        with:
          detectorsCategories: NuGet,Npm
