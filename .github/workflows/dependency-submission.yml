name: Dependency submission

# Self-managed replacement for GitHub's "Automatic dependency submission"
# (dynamic/dependency-graph/auto-submission).
#
# After merging, disable automatic submission at:
# Settings → Code security and analysis → Automatic dependency submission

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET dependencies
        working-directory: backend
        run: dotnet restore

      - name: Submit dependency graph
        uses: advanced-security/component-detection-dependency-submission-action@v0.1.4
        with:
          detectorsCategories: NuGet,Npm
